---
esphome:
  name: thermostat-dial
  friendly_name: Thermostat

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

api:

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

ota:
  - platform: esphome

# --- M5 Dial hardware (fixed pins) ---
spi:
  mosi_pin: GPIO5
  clk_pin: GPIO6

display:
  - platform: ili9xxx
    id: m5dial_display
    model: GC9A01A
    cs_pin: GPIO7
    dc_pin: GPIO4
    reset_pin: GPIO8
    invert_colors: true
    update_interval: never  # component controls redraws

font:
  - file: "gfonts://Roboto"
    id: font_mode
    size: 16
    bpp: 4
  - file: "gfonts://Roboto"
    id: font_setpoint
    size: 20
    bpp: 4
  - file: "gfonts://Roboto"
    id: font_temp
    size: 48
    bpp: 4

# --- Component ---
external_components:
  - source:
      type: git
      url: https://github.com/jamesshannon/esphome_m5_thermostat_display
      ref: main
    components: [m5dial_thermostat]

m5dial_thermostat:
  entity_id: climate.my_thermostat
  display_id: m5dial_display
  font_mode_id: font_mode
  font_setpoint_id: font_setpoint
  font_temp_id: font_temp
  # Optional (shown with defaults):
  # active_brightness: 255
  # idle_brightness: 50
  # idle_timeout: 30s
  # enable_sounds: true
  # comms_timeout: 30s
